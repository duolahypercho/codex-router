name: CI

"on":
  push: {}
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm test
      - name: Check shell syntax
        run: for file in install.sh bin/*; do sh -n "$file"; done
      - name: Check installer help
        run: ./install.sh --help
